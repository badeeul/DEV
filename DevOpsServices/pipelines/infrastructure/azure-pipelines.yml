          & $scriptPath -WorkspaceId $workspaceId -FabricSourcePath $srcFabricPath
        workingDirectory: '$(System.DefaultWorkingDirectory)/DevOpsServices/pipelines/scripts'
      env:
        FABRIC_TOKEN: $env:FABRIC_TOKEN

