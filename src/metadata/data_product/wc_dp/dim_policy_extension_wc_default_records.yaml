target:
  lakehouse: den_lhw_dpr_001_policy_product
  schema: wc
  table: dim_policy_extension_wc
  load_strategy: merge
  key_columns:
    - policy_num_bus_key
  unknown_record: False
  identity: False
  identity_column_name: policy_key

query:
  - name: dim_policy_extension_wc
    sql: |
      select 
          -1 AS policy_key
        , 'unknown' AS policy_num_bus_key
        , false AS is_multi_state_flag
        , 'unknown' AS gov_hazard_group
        , -1 AS dnb_score
        , -1.0 AS prior_wc_years_count

        , true as dl_is_current_flag
        , sha2(concat_ws('||', -1, 'unknown'), 256) as dl_row_hash
        , CURRENT_TIMESTAMP() dl_row_insert_timestamp
        , CURRENT_TIMESTAMP() dl_row_update_timestamp
        , 'ELT' as dl_row_insert_agent
        , 1 as dl_eltid
        , 1 as dl_runid
        , NULL as dl_row_expiration_date
        , CURRENT_DATE() as dl_row_effective_date
        , false as dl_is_deleted_flag
      
      union

      select 
          -2 AS policy_key
        , 'not applicable' AS policy_num_bus_key
        , false AS is_multi_state_flag
        , 'not applicable' AS gov_hazard_group
        , -2 AS dnb_score
        , -2.0 AS prior_wc_years_count

        , true as dl_is_current_flag
        , sha2(concat_ws('||', -2, 'not applicable'), 256) as dl_row_hash
        , CURRENT_TIMESTAMP() dl_row_insert_timestamp
        , CURRENT_TIMESTAMP() dl_row_update_timestamp
        , 'ELT' as dl_row_insert_agent
        , 1 as dl_eltid
        , 1 as dl_runid
        , NULL as dl_row_expiration_date
        , CURRENT_DATE() as dl_row_effective_date
        , false as dl_is_deleted_flag

    description: "This query adds the -1/unknown and -2/not applicable records to dim_policy_extension_wc, since 'identity: True' does not work with overwrite load strategy."
