target:
  lakehouse: den_lhw_dpr_001_policy_product # keep
  schema: policy # keep
  table: dim_insured_legal_entity_type # target table
  load_strategy: type_two # scd type
  key_columns: # is merge key
    - insd_leg_ent_type_cd_bus_key
  unknown_record: True # keep
  identity: True # keep
  identity_column_name: insd_leg_ent_type_key # sharepoint first row

source:
  - name: lookups # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: lookups # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.

query:
  - name: dim_insured_legal_entity_type # name of the query for it to be referenced by subsequent queries
    # use lower in where clause
    sql: SELECT VALS as insd_leg_ent_type_cd_bus_key
        , DESCRIP as insd_leg_ent_type_desc
        , True as dl_is_current_flag
        ,CAST('1901-01-01' AS DATE) as dl_row_effective_date
        ,CAST('9999-12-31' AS DATE) as dl_row_expiration_date
        ,False as dl_is_deleted_flag
        from (
        select * 
        , ROW_NUMBER() OVER ( PARTITION BY VALS ORDER BY Effective DESC) as rn
        from lookups where LOWER(trim(keyfield))='biztype' and LOWER(trim(programid))='wclocnam' and LOWER(trim(keyexcept))='n'
        ) as t
        where t.rn = 1