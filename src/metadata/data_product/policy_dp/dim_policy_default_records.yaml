target:
  lakehouse: den_lhw_dpr_001_policy_product
  schema: policy
  table: dim_policy
  load_strategy: merge
  key_columns:
    - policy_num_bus_key
  unknown_record: False
  identity: False
  identity_column_name: policy_key

query:
  - name: dim_policy
    sql: |
      select 
          -1 AS policy_key
        , 'unknown' AS policy_num_bus_key
        , 'unknown' AS policy_bus_type
        , 'unknown' AS gov_state
        , NULL AS policy_effec_start_dt
        , NULL AS policy_effec_end_dt
        , NULL AS policy_coverage_start_dt
        , NULL AS policy_coverage_end_dt
        , NULL AS policy_cancel_dt
        , NULL AS policy_cancel_trans_dt
        , NULL AS policy_audit_dt
        , NULL AS policy_sub_dt
        , NULL AS policy_issue_dt
        , NULL AS policy_inforce_start_date
        , NULL AS policy_inforce_end_date
        , 'unknown' AS current_inforce_policy_ind
        , 0 AS offer_rn
        , 'unknown' AS previous_policy_num_bus_key
        , 'unknown' AS next_policy_num_bus_key
        , 'unknown' AS chain_id
        , NULL AS first_dwnpymnt_recd_dt
        , 'unknown' AS rewritten_reissued_ind
        , 'unknown' AS rewrite_reissue_ind
        , 0 AS is_expiring_flag
        , 'unknown' AS is_renewable_flag
        , 0 AS is_prev_policy_ubetag_flag
        , 0 AS is_cloned_flag
        , 'unknown' AS src_policy_status_descrip
        , -1 AS latest_policy_status_key
        , -1 AS digital_decision_status_key
        , 'unknown' AS autouw_status_desc
        , 'unknown' AS sub_point_of_origin_desc
        , true as dl_is_current_flag
        , CAST('1901-01-01' AS DATE) as dl_row_effective_date
        , CAST('9999-12-31' AS DATE) as dl_row_expiration_date
        , false as dl_is_deleted_flag
        , sha2(concat_ws('||', -1, 'unknown'), 256) as dl_row_hash
        , CURRENT_TIMESTAMP() as dl_row_insert_timestamp
        , CURRENT_TIMESTAMP() as dl_row_update_timestamp
        , 'ELT' as dl_row_insert_agent
        , sha2(concat_ws('|||', -1, 'unknown'), 256) as dl_eltid
        , sha2(concat_ws('||||', -1, 'unknown'), 256) as dl_runid
        , 0 as dq_effec_st_dt_check
        , 0 as dq_coverage_st_dt_check
        , 0 as dq_coverage_end_dt_check
      
      union all

      select 
          -2 AS policy_key
        , 'not applicable' AS policy_num_bus_key
        , 'not applicable' AS policy_bus_type
        , 'not applicable' AS gov_state
        , NULL AS policy_effec_start_dt
        , NULL AS policy_effec_end_dt
        , NULL AS policy_coverage_start_dt
        , NULL AS policy_coverage_end_dt
        , NULL AS policy_cancel_dt
        , NULL AS policy_cancel_trans_dt
        , NULL AS policy_audit_dt
        , NULL AS policy_sub_dt
        , NULL AS policy_issue_dt
        , NULL AS policy_inforce_start_date
        , NULL AS policy_inforce_end_date
        , 'not applicable' AS current_inforce_policy_ind
        , 0 AS offer_rn
        , 'not applicable' AS previous_policy_num_bus_key
        , 'not applicable' AS next_policy_num_bus_key
        , 'not applicable' AS chain_id
        , NULL AS first_dwnpymnt_recd_dt
        , 'not applicable' AS rewritten_reissued_ind
        , 'not applicable' AS rewrite_reissue_ind
        , 0 AS is_expiring_flag
        , 'not applicable' AS is_renewable_flag
        , 0 AS is_prev_policy_ubetag_flag
        , 0 AS is_cloned_flag
        , 'not applicable' AS src_policy_status_descrip
        , -2 AS latest_policy_status_key
        , -2 AS digital_decision_status_key
        , 'not applicable' AS autouw_status_desc
        , 'not applicable' AS sub_point_of_origin_desc
        , true as dl_is_current_flag
        , CAST('1901-01-01' AS DATE) as dl_row_effective_date
        , CAST('9999-12-31' AS DATE) as dl_row_expiration_date
        , false as dl_is_deleted_flag
        , sha2(concat_ws('||', -2, 'not applicable'), 256) as dl_row_hash
        , CURRENT_TIMESTAMP() as dl_row_insert_timestamp
        , CURRENT_TIMESTAMP() as dl_row_update_timestamp
        , 'ELT' as dl_row_insert_agent
        , sha2(concat_ws('|||', -2, 'not applicable'), 256) as dl_eltid
        , sha2(concat_ws('||||', -2, 'not applicable'), 256) as dl_runid
        , 0 as dq_effec_st_dt_check
        , 0 as dq_coverage_st_dt_check
        , 0 as dq_coverage_end_dt_check
        
    description: "This query adds the -1/unknown and -2/not applicable records to dim_policy, since 'identity: True' does not work with overwrite load strategy."