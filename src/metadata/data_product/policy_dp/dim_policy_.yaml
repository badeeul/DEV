target:
  lakehouse: den_lhw_dpr_001_policy_product # keep
  schema: policy # keep
  table: dim_policy # target table
  load_strategy: merge # scd type
  key_columns: # is merge key
    - policy_num_bus_key
  unknown_record: True # keep
  identity: True # keep
  identity_column_name: policy_key # sharepoint first row
  partition_by:
    - policy_year

source:
  - name: insured
    lakehouse: den_lhw_scu_001_policy_curated
    schema: policy
    table: insured
    incremental: False

  - name: wcinfo
    lakehouse: den_lhw_scu_001_policy_curated
    schema: policy
    table: wcinfo
    incremental: False

  - name: billings
    lakehouse: den_lhw_scu_001_policy_curated
    schema: policy
    table: billings
    incremental: False

  - name: lookups
    lakehouse: den_lhw_scu_001_policy_curated
    schema: policy
    table: lookups
    incremental: False

  - name: mgnotrans
    lakehouse: den_lhw_scu_001_policy_curated
    schema: policy
    table: mgnotrans
    incremental: False

  - name: stg_policy_base
    lakehouse: den_lhw_scu_001_policy_curated
    schema: stg_policy
    table: stg_policy_base
    incremental: False

  - name: stg_policy_derived
    lakehouse: den_lhw_scu_001_policy_curated
    schema: stg_policy
    table: stg_policy_derived
    incremental: False

  - name: dim_policy_status
    lakehouse: den_lhw_dpr_001_policy_product
    schema: policy
    table: dim_policy_status
    incremental: False

  - name: dim_digital_decision_status
    lakehouse: den_lhw_dpr_001_policy_product
    schema: policy
    table: dim_digital_decision_status
    incremental: False

query:
  - name: dim_policy
    sql: |
      SELECT
        i.code AS policy_num_bus_key,
        CASE
          WHEN LOWER(TRIM(i.flags14)) = 'n' THEN 'New'
          ELSE 'Renewal'
        END AS policy_bus_type,
        w.govstate AS gov_state,
        CAST(pb.policy_effec_start_dt AS DATE) AS policy_effec_start_dt,
        CAST(pb.policy_effec_end_dt AS DATE) AS policy_effec_end_dt,
        CAST(pb.policy_coverage_start_dt AS DATE) AS policy_coverage_start_dt,
        CAST(pb.policy_coverage_end_dt AS DATE) AS policy_coverage_end_dt,
        CAST(pb.policy_cancel_dt AS DATE) AS policy_cancel_dt,
        CAST(pb.policy_cancel_trans_dt AS DATE) AS policy_cancel_trans_dt,
        CAST(pb.policy_audit_dt AS DATE) AS policy_audit_dt,
        CAST(pb.policy_sub_dt AS DATE) AS policy_sub_dt,
        CAST(pb.policy_issue_dt AS DATE) AS policy_issue_dt,
        pd.policy_inforce_start_date,
        pd.policy_inforce_end_date,
        (
          CASE 
            WHEN pd.policy_inforce_start_date <= CAST(DATE_ADD(CURRENT_DATE(), -1) AS DATE) 
              AND pd.policy_inforce_end_date > CAST(DATE_ADD(CURRENT_DATE(), -1) AS DATE) 
            THEN 'Y' 
            ELSE 'N' 
          END
        ) AS current_inforce_policy_ind,
        CASE
          WHEN LOWER(TRIM(i.offerren)) = 'y' THEN 1
          ELSE 0
        END AS offer_rn,
        i.renewalofcode AS previous_policy_num_bus_key,
        pb.nextpol AS next_policy_num_bus_key,
        CAST(i.chainid AS STRING) AS chain_id,
        CAST(b.firstpaid AS DATE) AS first_dwnpymnt_recd_dt,
        (
          CASE
            WHEN LOWER(TRIM(i.flags39)) IN ('w', 'x') THEN UPPER(i.flags39)
          END
        ) AS rewritten_reissued_ind,
        (
          CASE
            WHEN LOWER(TRIM(i.flags04)) IN ('w', 'x') THEN UPPER(i.flags04)
          END
        ) AS rewrite_reissue_ind,
        CASE WHEN (LOWER(TRIM(COALESCE(i.stat2,''))) <> 'i') 
            OR (LOWER(TRIM(COALESCE(i.stat2,'')))  = 'i' 
            AND LOWER(TRIM(COALESCE(i.stat5,''))) = 'c' 
            AND LOWER(TRIM(COALESCE(pb.nextpolstat2,''))) <> 'i') 
          THEN 0
          WHEN (LOWER(TRIM(COALESCE(i.stat2,'')))  = 'i' 
            AND LOWER(TRIM(COALESCE(i.stat5,''))) = 'c'  
            AND LOWER(TRIM(COALESCE(pb.nextpolstat2,'')))  = 'i')
            OR (LOWER(TRIM(COALESCE(i.stat2,'')))  = 'i' 
            AND LOWER(TRIM(COALESCE(i.stat5,''))) <> 'c')
          THEN 1
          ELSE 0
        END AS is_expiring_flag,
        CASE 
            WHEN (
                CASE 
                    WHEN (LOWER(TRIM(COALESCE(i.stat2,''))) <> 'i')
                        OR (LOWER(TRIM(COALESCE(i.stat2,''))) = 'i' 
                            AND LOWER(TRIM(COALESCE(i.stat5,''))) = 'c' 
                            AND LOWER(TRIM(COALESCE(pb.nextpolstat2,''))) <> 'i')
                    THEN 0
                    WHEN (LOWER(TRIM(COALESCE(i.stat2,''))) = 'i' 
                            AND LOWER(TRIM(COALESCE(i.stat5,''))) = 'c' 
                            AND LOWER(TRIM(COALESCE(pb.nextpolstat2,''))) = 'i')
                        OR (LOWER(TRIM(COALESCE(i.stat2,''))) = 'i' 
                            AND LOWER(TRIM(COALESCE(i.stat5,''))) <> 'c')
                    THEN 1
                    ELSE 0
                END
            ) = 0 
            THEN 'N'  
        ELSE
            CASE 
                WHEN pb.nextpol IS NOT NULL                                                                
                    AND (LOWER(TRIM(COALESCE(pb.nextpolstat2,''))) = 'i' 
                        OR (LOWER(TRIM(COALESCE(pb.nextpolstat2,''))) <> 'i' 
                            AND LOWER(TRIM(COALESCE(i.offerren,''))) = 'y'))
                THEN 'Y'
                WHEN (LOWER(TRIM(COALESCE(i.stat2,''))) = 'i' 
                    AND LOWER(TRIM(COALESCE(i.stat5,''))) = 'c' 
                    AND pb.nextpol IS NULL)
                THEN 'N'
                WHEN (LOWER(TRIM(COALESCE(i.offerren,''))) <> 'y' AND i.offerren IS NOT NULL)
                    OR (LOWER(TRIM(COALESCE(pb.nextpolstat2,''))) <> 'i' 
                        AND LOWER(TRIM(COALESCE(ln.descrip,''))) IN ('declined by agency','declined by ca/uw'))
                    OR (LOWER(TRIM(COALESCE(l.descrip,''))) IN ('declined by agency','declined by ca/uw'))
                THEN 'N'
                ELSE 'U'
            END
        END AS is_renewable_flag,
        (
          CASE
            WHEN m.code IS NOT NULL THEN 1
            ELSE 0
          END
        ) AS is_prev_policy_ubetag_flag,
        (
          CASE
            WHEN pb.nextpol IS NOT NULL THEN 1
            ELSE 0
          END
        ) AS is_cloned_flag,
        l.descrip AS src_policy_status_descrip,
        COALESCE(dpol.policy_status_key, -1) AS latest_policy_status_key,
        ddst.digital_decision_status_key  AS  digital_decision_status_key,
        pb.autouwstatus AS autouw_status_desc,
        CASE WHEN LOWER(TRIM(i.flags14)) = 'n' THEN pb.sub_poo END AS sub_point_of_origin_desc,
        TRUE AS dl_is_current_flag,
        CAST('1901-01-01' AS DATE) AS dl_row_effective_date,
        CAST('9999-12-31' AS DATE) AS dl_row_expiration_date,
        FALSE AS dl_is_deleted_flag
        , case when CAST(policy_effec_start_dt AS DATE) > CAST(policy_effec_end_dt AS DATE) then 0 else 1 end as dq_effec_st_dt_check
        , case when CAST(policy_coverage_start_dt AS DATE) < CAST(policy_effec_start_dt AS DATE) then 0 else 1 end as dq_coverage_st_dt_check
        , case when CAST(policy_coverage_end_dt AS DATE) > CAST(policy_effec_end_dt AS DATE) then 0 else 1 end as dq_coverage_end_dt_check
        , YEAR(CAST(pb.policy_effec_start_dt AS DATE)) AS policy_year
      FROM
        insured i
        LEFT OUTER JOIN billings b ON LOWER(TRIM(b.code)) = LOWER(TRIM(i.code))
        LEFT OUTER JOIN wcinfo w ON LOWER(TRIM(w.code)) = LOWER(TRIM(i.code))
        LEFT OUTER JOIN lookups l ON LOWER(TRIM(l.keyfield)) = 'stat7'
          AND LOWER(TRIM(l.programid)) = 'insured'
          AND LOWER(TRIM(l.vals)) = LOWER(TRIM(i.stat7))
        LEFT OUTER JOIN stg_policy_base pb ON LOWER(TRIM(pb.code)) = LOWER(TRIM(i.code))
        LEFT OUTER JOIN stg_policy_derived pd ON LOWER(TRIM(pd.code)) = LOWER(TRIM(i.code))
        LEFT OUTER JOIN (
          SELECT DISTINCT
            code
          FROM
            mgnotrans
          WHERE
            LOWER(TRIM(reason)) = '13.00'
        ) mg ON LOWER(TRIM(mg.code)) = LOWER(TRIM(i.code))
          LEFT OUTER JOIN (select distinct code FROM mgnotrans WHERE typeid = 39) mg2 ON LOWER(TRIM(i.code)) = LOWER(TRIM(mg2.code))
        LEFT OUTER JOIN insured p ON LOWER(TRIM(p.code)) = LOWER(TRIM(i.renewalofcode))
        LEFT JOIN (
          SELECT DISTINCT
            mn.code
          FROM
            mgnotrans mn
            INNER JOIN mgnotrans mn2 ON LOWER(TRIM(mn.code)) = LOWER(TRIM(mn2.code))
              AND mn2.typeid = 143
            LATERAL VIEW EXPLODE (SPLIT(mn.extra, '\\|')) x AS value
          WHERE
            LOWER(TRIM(mn.transcode)) = 'ex'
            AND LOWER(TRIM(value)) <> ''
        ) m ON LOWER(TRIM(m.code)) = LOWER(TRIM(p.code))
        LEFT OUTER JOIN lookups ln ON LOWER(TRIM(ln.keyfield)) = 'stat7'
          AND LOWER(TRIM(ln.programid)) = 'insured'
          AND LOWER(TRIM(ln.vals)) = LOWER(TRIM(pb.nextpolstat7))
        LEFT OUTER JOIN dim_policy_status dpol ON LOWER(TRIM(dpol.policy_status_cd_bus_key)) = LOWER(TRIM(pd.policy_status_cd))

        LEFT OUTER JOIN dim_digital_decision_status ddst ON LOWER(TRIM(ddst.digital_decision_status_cd_bus_key)) =
        CASE
        WHEN  CONCAT('|', COALESCE(dpol.l0_level,''), '|', COALESCE(dpol.l1_level,''), '|', COALESCE(dpol.l2_level,''), '|', COALESCE(dpol.l3_level,''), '|', COALESCE(dpol.l4_level,''), '|', COALESCE(dpol.l5_level,''), '|') LIKE '%|NB - New Submission|%'
          THEN  CASE  
                WHEN  pb.sub_poo = 'Programs/Bindings' OR LOWER(TRIM(i.markettype)) IN ('r','a') OR LOWER(TRIM(i.productionsrc)) = 'l'
                  THEN  'excluded from digital decisioning' 
                WHEN  mg2.code IS NULL AND LOWER(TRIM(COALESCE(pb.autouwstatus,''))) = 'pass' AND pb.sub_poo <> 'Manual/Supplemental' AND CONCAT('|', COALESCE(dpol.l0_level,''), '|', COALESCE(dpol.l1_level,''), '|', COALESCE(dpol.l2_level,''), '|', COALESCE(dpol.l3_level,''), '|', COALESCE(dpol.l4_level,''), '|', COALESCE(dpol.l5_level,''), '|') LIKE '%|NB - Quoted|%'
                  THEN  'digitally decisioned'
                WHEN  mg2.code IS NULL AND LOWER(TRIM(COALESCE(pb.autouwstatus,''))) = 'decline' AND pb.sub_poo <> 'Manual/Supplemental'
                  THEN  'digitally decisioned'
                WHEN  mg2.code IS NOT NULL AND LOWER(TRIM(COALESCE(pb.autouwstatus,''))) IN ('pass','decline') AND pb.sub_poo <> 'Manual/Supplemental'
                  THEN  'mitigating circumstances'
                WHEN  mg2.code IS NOT NULL AND LOWER(TRIM(COALESCE(pb.autouwstatus,''))) = 'referral' AND pb.sub_poo <> 'Manual/Supplemental'
                  THEN  'digitally assisted'
                WHEN  LOWER(TRIM(COALESCE(pb.autouwstatus,''))) = 'referral' AND pb.sub_poo <> 'Manual/Supplemental' AND CONCAT('|', COALESCE(dpol.l0_level,''), '|', COALESCE(dpol.l1_level,''), '|', COALESCE(dpol.l2_level,''), '|', COALESCE(dpol.l3_level,''), '|', COALESCE(dpol.l4_level,''), '|', COALESCE(dpol.l5_level,''), '|') NOT LIKE '%|NB - Quoted|%'
                  THEN  'incomplete'
                WHEN  pb.sub_poo = 'Manual/Supplemental'
                  THEN  'manual / supplemental'
                WHEN  CONCAT('|', COALESCE(dpol.l0_level,''), '|', COALESCE(dpol.l1_level,''), '|', COALESCE(dpol.l2_level,''), '|', COALESCE(dpol.l3_level,''), '|', COALESCE(dpol.l4_level,''), '|', COALESCE(dpol.l5_level,''), '|') LIKE '%|NB - Quoted|%' AND coalesce(i.decsbr,i.decuw) = '1~'
                  THEN  'digitally decisioned'
                WHEN  CONCAT('|', COALESCE(dpol.l0_level,''), '|', COALESCE(dpol.l1_level,''), '|', COALESCE(dpol.l2_level,''), '|', COALESCE(dpol.l3_level,''), '|', COALESCE(dpol.l4_level,''), '|', COALESCE(dpol.l5_level,''), '|') LIKE '%|NB - Quoted|%' AND coalesce(i.decsbr,i.decuw) <> '1~'
                  THEN  'manual / supplemental'
                ELSE  'incomplete'
                END
        ELSE  'not applicable'
        END
 
      WHERE
        LOWER(TRIM(i.code)) = LOWER(TRIM(i.basemgacode))
        AND LOWER(TRIM(i.agency)) <> 'pafake10'
