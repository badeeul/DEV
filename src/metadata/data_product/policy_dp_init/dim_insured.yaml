target:
  lakehouse: den_lhw_dpr_001_policy_product # keep
  schema: policy # keep
  table: dim_insured # target table
  load_strategy: merge # scd type
  key_columns: # is merge key
    - policy_num_bus_key
  unknown_record: True # keep
  identity: True # keep
  identity_column_name: insd_key # sharepoint first row

source:
  - name: insured # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: insured # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: fips # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: fips # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: mgextra # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: mgextra # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: wclocnam # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: wclocnam # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: archive_wclocnam # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: archive_wclocnam # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: archive_insured # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: archive_insured # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: dim_insured_legal_entity_type # source table names
    lakehouse: den_lhw_dpr_001_policy_product # keep
    schema: policy # keep
    table: dim_insured_legal_entity_type # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.

query:
  - name: dim_insured # name of the query for it to be referenced by subsequent queries
    # use lower in where clause
    sql: select 
         i.code as policy_num_bus_key
        , (case when LOWER(trim(i.name))<>'redacted' then coalesce(m.address1, i.address1) else coalesce(am.address1,ai.address1) end) as mail_add1
        , (case when LOWER(trim(i.name))<>'redacted' then coalesce(m.address2, i.address2) else coalesce(am.address2,ai.address2) end) as mail_add2
        , (case when LOWER(trim(i.name))<>'redacted' then coalesce(m.city, i.city) else coalesce(am.city,ai.city) end) as mail_city
        , coalesce(m.state, i.state) as mail_state
        , left(coalesce(m.zipcode, i.zipcode),5) as mail_zip
        , f.name as mail_county
        , (case when LOWER(trim(i.name))<>'redacted' then coalesce(n.text,i.name) else coalesce(an.text,ai.name) end) as insd_nm
        , COALESCE(lget.insd_leg_ent_type_key, -1) as legal_ent_type_key
        , x.yrbusst as bus_start_year
        , x.descriptionofoperations as desc_of_ops
        , CAST(i.crmid AS STRING) as crmid
        , True as dl_is_current_flag
        ,CAST('1901-01-01' AS DATE) as dl_row_effective_date
        ,CAST('9999-12-31' AS DATE) as dl_row_expiration_date
        ,False as dl_is_deleted_flag

        from insured i
        left outer join mgextra x on lower(trim(i.code))=lower(trim(x.code))
        left outer join (select distinct code, uselocnum, lower(address1) as address1, lower(address2) as address2, lower(city) as city, state, zipcode, county from wclocnam) m on lower(trim(i.code))=lower(trim(m.code)) and lower(trim(m.uselocnum))='m'
        left outer join (select distinct code, uselocnum, lower(address1) as address1, lower(address2) as address2, lower(city) as city from archive_wclocnam) am on lower(trim(i.code))=lower(trim(am.code)) and lower(trim(am.uselocnum))='m'
        left outer join (select distinct code, type, uselocnum, text from wclocnam) n on lower(trim(i.code))=lower(trim(n.code)) and lower(trim(n.type))='n' and lower(trim(n.uselocnum))='n'
        left outer join (select distinct code, type, uselocnum, text from archive_wclocnam) an on lower(trim(i.code))=lower(trim(an.code)) and lower(trim(an.type))='n' and lower(trim(an.uselocnum))='n'
        left outer join (select distinct code, name, lower(address1) as address1, lower(address2) as address2, lower(city) as city from archive_insured) ai on lower(trim(i.code))=lower(trim(ai.code)) and LOWER(trim(ai.city)) <> 'redacted'
        left outer join dim_insured_legal_entity_type lget on lower(trim(i.biztype)) = lower(trim(lget.insd_leg_ent_type_cd_bus_key))
        left outer join fips f on lower(trim(f.state)) = lower(trim(i.state)) and lower(trim(f.fips)) = coalesce(lower(trim(m.county)), lower(trim(i.county)))

        WHERE lower(trim(i.code)) = lower(trim(i.basemgacode)) and lower(trim(i.agency))<>'pafake10'