target:
  lakehouse: den_lhw_dpr_001_policy_product # keep
  schema: policy # keep
  table: dim_naics # target table
  load_strategy: type_two # scd type
  key_columns: # is merge key
    - naics_bus_key
  unknown_record: True # keep
  identity: True # keep
  identity_column_name: naics_key # sharepoint first row

source:
  - name: naics # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: naics # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.

query:
  - name: dim_naics # name of the query for it to be referenced by subsequent queries
    # use lower in where clause
    sql: select distinct
        naics as naics_bus_key
        , descrip as naics_desc
        , guardlv1 as naics_industry
        , guardlv2 as naics_sub_industry
        , guardlv3 as naics_bus_type
        , left(naics,2) as naics_two_digit
        , left(naics,3) as naics_three_digit
        , left(naics,4) as naics_four_digit
        , left(naics,5) as naics_five_digit
        , True as dl_is_current_flag
        ,CAST('1901-01-01' AS DATE) as dl_row_effective_date
        ,CAST('9999-12-31' AS DATE) as dl_row_expiration_date
        ,False as dl_is_deleted_flag
        from naics