target:
  lakehouse: den_lhw_dpr_001_cauto_product
  schema: cauto
  table: dim_vehicle
  load_strategy: merge
  key_columns:
    - policy_num_bus_key
    - vehicle_bus_key
  unknown_record: False
  identity: False
  identity_column_name: vehicle_surrogate_key

query:
  - name: dim_vehicle
    sql: |
      select 
          -1 AS vehicle_surrogate_key
        , -1 AS vehicle_type_surrogate_key
        , -1 AS trailer_type_surrogate_key
        , 'unknown' AS policy_num_bus_key
        , 'unknown' AS vehicle_bus_key
        , -1 AS vehicle_number
        , 'unknown' AS vin
        , 'unknown' AS vehicle_make
        , 'unknown' AS vehicle_model
        , -1 AS vehicle_model_year
        , CAST('1901-01-01' AS DATE) AS vehicle_start_date
        , CAST('1901-01-01' AS DATE) AS vehicle_end_date
        , CAST('1901-01-01' AS DATE) AS vehicle_deleted_on_date
        , true as dl_is_current_flag
        , sha2(concat_ws('||', -1, 'unknown', 'unknown'), 256) as dl_row_hash
        , CURRENT_TIMESTAMP() dl_row_insert_timestamp
        , CURRENT_TIMESTAMP() dl_row_update_timestamp
        , 'ELT' as dl_row_insert_agent
        , sha2(concat_ws('||', -1, 'unknown', 'unknown'), 256) as dl_eltid
        , sha2(concat_ws('||', -1, 'unknown', 'unknown'), 256) as dl_runid
        , NULL as dl_row_expiration_date
        , CURRENT_DATE() as dl_row_effective_date
        , false as dl_is_deleted_flag
      
      union

      select 
          -2 AS vehicle_surrogate_key
        , -2 AS vehicle_type_surrogate_key
        , -2 AS trailer_type_surrogate_key
        , 'not applicable' AS policy_num_bus_key
        , 'not applicable' AS vehicle_bus_key
        , -2 AS vehicle_number
        , 'not applicable' AS vin
        , 'not applicable' AS vehicle_make
        , 'not applicable' AS vehicle_model
        , -2 AS vehicle_model_year
        , CAST('1901-01-01' AS DATE) AS vehicle_start_date
        , CAST('1901-01-01' AS DATE) AS vehicle_end_date
        , CAST('1901-01-01' AS DATE) AS vehicle_deleted_on_date
        , true as dl_is_current_flag
        , sha2(concat_ws('||', -2, 'not applicable', 'not applicable'), 256) as dl_row_hash
        , CURRENT_TIMESTAMP() dl_row_insert_timestamp
        , CURRENT_TIMESTAMP() dl_row_update_timestamp
        , 'ELT' as dl_row_insert_agent
        , sha2(concat_ws('||', -2, 'not applicable', 'not applicable'), 256) as dl_eltid
        , sha2(concat_ws('||', -2, 'not applicable', 'not applicable'), 256) as dl_runid
        , NULL as dl_row_expiration_date
        , CURRENT_DATE() as dl_row_effective_date
        , false as dl_is_deleted_flag

    description: "This query adds the -1/unknown and -2/not applicable records to dim_vehicle, since 'identity: True' does not work with overwrite load strategy."
