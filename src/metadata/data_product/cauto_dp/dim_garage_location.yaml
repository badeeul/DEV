target:
  lakehouse: den_lhw_dpr_001_cauto_product # keep
  schema: cauto # keep
  table: dim_garage_location # target table
  load_strategy: merge # scd type
  key_columns: # is merge key
    - policy_num_bus_key
    - garage_loc_bus_key
  unknown_record: True # keep
  identity: True # keep
  identity_column_name: garage_loc_surrogate_key # sharepoint first row

source:
  - name: wclocnam # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: wclocnam # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: insured # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: insured # source tables
    incremental: True # if data is not ingested incrementally, it doesn't make sense to load incrementally here.
  - name: fips # source table names
    lakehouse: den_lhw_scu_001_policy_curated # keep
    schema: policy # keep
    table: fips # source tables
    incremental: False # if data is not ingested incrementally, it doesn't make sense to load incrementally here.

query:
  - name: dim_garage_location # name of the query for it to be referenced by subsequent queries
    # use lower in where clause
    sql: select 
         l.code as policy_num_bus_key
        , l.loctypenum as garage_loc_bus_key
        , left(l.locnum,3) as garage_loc_number
        , l.address1 as garage_loc_address1
        , l.address2 as garage_loc_address2
        , l.city as garage_loc_city
        , l.state as garage_loc_state
        , left(l.zipcode,5) as garage_loc_zipcode
        , l.zipcode as garage_loc_zipcode_plus_extension
        , f.name as garage_loc_county
        , l.latitude as garage_loc_latitude
        , l.longitude as garage_loc_longitude
        , True as dl_is_current_flag
        , CAST('1901-01-01' AS DATE) as dl_row_effective_date
        , CAST('9999-12-31' AS DATE) as dl_row_expiration_date
        , False as dl_is_deleted_flag

        from wclocnam l
        inner join insured i on lower(trim(l.code)) = lower(trim(i.code))
        left outer join fips f on lower(trim(l.state)) = lower(trim(f.state)) and lower(trim(l.county)) = lower(trim(f.fips))

        where lower(trim(i.lob)) = 'ca'
        and lower(trim(i.code)) = lower(trim(i.basemgacode))
        and lower(trim(i.agency)) <> 'pafake10'
        and lower(trim(i.stat2)) = 'i'
        and lower(trim(l.type)) = 'p'
